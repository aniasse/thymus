<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thymos — {% block title %}Dashboard{% endblock %}</title>
    <script src="/static/htmx.min.js"></script>
    <style>
        :root {
            --bg: #0a0e17;
            --surface: #111827;
            --border: #1e293b;
            --text: #e2e8f0;
            --muted: #64748b;
            --accent: #3b82f6;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --orange: #f97316;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .layout { display: flex; min-height: 100vh; }
        nav {
            width: 220px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 1.5rem 0;
            flex-shrink: 0;
        }
        nav .logo {
            font-size: 1.25rem;
            font-weight: 700;
            padding: 0 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            letter-spacing: 0.05em;
        }
        nav .logo span { color: var(--accent); }
        nav a {
            display: block;
            padding: 0.75rem 1.25rem;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.875rem;
            transition: all 0.15s;
        }
        nav a:hover, nav a.active {
            color: var(--text);
            background: rgba(59, 130, 246, 0.1);
            border-right: 2px solid var(--accent);
        }
        nav .nav-section {
            padding: 1rem 1.25rem 0.5rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }
        main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }
        h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1.25rem;
        }
        .card-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .card-value { font-size: 2rem; font-weight: 700; margin-top: 0.25rem; }
        .card-value.green { color: var(--green); }
        .card-value.red { color: var(--red); }
        .card-value.yellow { color: var(--yellow); }
        .card-value.accent { color: var(--accent); }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
        .badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
        .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
        .badge-blue { background: rgba(59,130,246,0.15); color: var(--accent); }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            padding: 0.75rem 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }
        tr:hover td { background: rgba(59,130,246,0.05); }
        .progress {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }
        .score-bar {
            display: inline-block;
            width: 60px;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            vertical-align: middle;
        }
        .score-fill {
            height: 100%;
            border-radius: 4px;
        }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .panel-title { font-size: 0.875rem; font-weight: 600; margin-bottom: 1rem; }
        .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8rem; }
        .text-muted { color: var(--muted); }
        .text-sm { font-size: 0.8rem; }
        .mt-1 { margin-top: 0.5rem; }
        .mb-1 { margin-bottom: 0.5rem; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .gap-1 { gap: 0.5rem; }
        .gap-2 { gap: 1rem; }
        button, .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.15s;
        }
        button:hover, .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:hover { opacity: 0.9; color: #fff; }
        .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
        .htmx-request .htmx-indicator { opacity: 1; }
    </style>
</head>
<body>
    <div class="layout">
        <nav>
            <div class="logo"><span>θ</span> Thymos</div>
            <div class="nav-section">Monitoring</div>
            <a href="/" {% block nav_status %}{% endblock %}>Status</a>
            <a href="/mutations" {% block nav_mutations %}{% endblock %}>Mutations</a>
            <a href="/machines" {% block nav_machines %}{% endblock %}>Machines</a>
        </nav>
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
