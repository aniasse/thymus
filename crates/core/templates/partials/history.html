{% if rows.is_empty() %}
<div class="panel">
    <p class="text-muted">Aucun incident enregistré.</p>
</div>
{% else %}
<div class="panel">
    <table>
        <thead>
            <tr>
                <th>Heure</th>
                <th>Statut</th>
                <th>Score</th>
                <th>Machine</th>
                <th>Type</th>
                <th>Détail</th>
            </tr>
        </thead>
        <tbody>
            {% for r in rows %}
            <tr>
                <td class="mono text-sm">{{ r.detected_at }}</td>
                <td>
                    <span class="badge {{ r.status_class }}">{{ r.status_label }}</span>
                </td>
                <td>
                    <span class="badge {% if r.risk_score >= 0.8 %}badge-red{% elif r.risk_score >= 0.6 %}badge-yellow{% else %}badge-blue{% endif %}">
                        {{ r.risk_pct }}%
                    </span>
                </td>
                <td class="mono">{{ r.machine_id }}</td>
                <td class="text-sm">{{ r.dimensions }}</td>
                <td class="text-sm text-muted">{{ r.description }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endif %}
