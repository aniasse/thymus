<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thymos — Connexion</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0e17;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-box {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 0.75rem;
            padding: 2.5rem;
            width: 320px;
            text-align: center;
        }
        .logo { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
        .logo span { color: #3b82f6; }
        .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 1.5rem; }
        input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #1e293b;
            background: #0a0e17;
            color: #e2e8f0;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: #3b82f6; }
        button {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: none;
            background: #3b82f6;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        .error { color: #ef4444; font-size: 0.8rem; margin-top: 0.75rem; min-height: 1rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo"><span>θ</span> Thymos</div>
        <div class="subtitle">Système immunitaire réseau</div>
        <input type="password" id="token" placeholder="Token d'accès" autofocus>
        <button onclick="login()">Connexion</button>
        <div class="error" id="error"></div>
    </div>
    <script>
        async function login() {
            const token = document.getElementById('token').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            if (res.ok) {
                window.location.href = '/';
            } else {
                document.getElementById('error').textContent = 'Token invalide';
            }
        }
        document.getElementById('token').addEventListener('keydown', e => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
